<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Energy Intensity Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        header {
            padding: 24px 32px 8px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
        }
        header p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 16px 32px;
            flex-wrap: wrap;
        }
        .metric-toggle {
            display: flex;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .metric-toggle button {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .metric-toggle button.active {
            background: #3b82f6;
            color: #fff;
        }
        .metric-toggle button:hover:not(.active) {
            background: #334155;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-group label {
            font-size: 14px;
            color: #94a3b8;
        }
        .year-display {
            font-size: 32px;
            font-weight: 700;
            color: #3b82f6;
            min-width: 60px;
            text-align: center;
        }
        input[type="range"] {
            width: 300px;
            accent-color: #3b82f6;
            cursor: pointer;
        }
        .play-btn {
            padding: 8px 16px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #1e293b;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .play-btn:hover { background: #334155; }
        .play-btn.playing { background: #ef4444; border-color: #ef4444; }
        #map { width: 100%; height: 520px; }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            padding: 8px 32px 16px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 24px;
            text-align: center;
            min-width: 180px;
        }
        .stat-card .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 22px; font-weight: 700; color: #f8fafc; margin-top: 4px; }
        .stat-card .unit { font-size: 11px; color: #94a3b8; }
        #timeline { width: 100%; height: 250px; }
        .bottom-section {
            display: flex;
            gap: 0;
            padding: 0 32px 24px;
        }
        #timeline-container { flex: 1; }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            font-size: 18px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <header>
        <h1>Global Energy Intensity Dashboard</h1>
        <p>EIA International Energy Data &mdash; 231 countries, 1980&ndash;2023</p>
    </header>
    <div class="controls">
        <div class="metric-toggle">
            <button id="btn-pop" class="active" onclick="setMetric('population')">Energy per Capita</button>
            <button id="btn-gdp" onclick="setMetric('gdp')">Energy per GDP</button>
        </div>
        <div class="slider-group">
            <label>Year</label>
            <input type="range" id="yearSlider" min="1980" max="2023" value="2023" oninput="setYear(+this.value)">
            <span class="year-display" id="yearLabel">2023</span>
        </div>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
    </div>
    <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="label">World Average</div><div class="value" id="statWorld">--</div><div class="unit" id="statWorldUnit"></div></div>
        <div class="stat-card"><div class="label">Highest</div><div class="value" id="statMax">--</div><div class="unit" id="statMaxCountry"></div></div>
        <div class="stat-card"><div class="label">Lowest (with data)</div><div class="value" id="statMin">--</div><div class="unit" id="statMinCountry"></div></div>
        <div class="stat-card"><div class="label">Countries with data</div><div class="value" id="statCount">--</div><div class="unit">&nbsp;</div></div>
    </div>
    <div id="map"></div>
    <div class="bottom-section">
        <div id="timeline-container"><div id="timeline"></div></div>
    </div>

    <script>
    // Non-standard codes in the EIA data that need mapping to ISO alpha-3
    const CODE_MAP = {
        'WORL': null, // World aggregate - skip for map
        'HKNG': 'HKG', 'MACA': 'MAC', 'TAIW': 'TWN',
        'CSXX': 'CZE', 'CSK': null, 'SCG': null, 'SUN': null,
        'YUG': null, 'DDR': null, 'DEUW': null, 'HITZ': null,
        'USIQ': null, 'USOH': null, 'WAK': null, 'NLDA': null
    };

    let allData = {}; // { code: { name, pop: {year: val}, gdp: {year: val} } }
    let worldData = { pop: {}, gdp: {} };
    let currentMetric = 'population';
    let currentYear = 2023;
    let playing = false;
    let playTimer = null;
    const years = [];
    for (let y = 1980; y <= 2023; y++) years.push(y);

    async function loadData() {
        const resp = await fetch('../INT-Export-02-25-2026_14-58-07.csv');
        let text = await resp.text();
        // Remove BOM
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const lines = text.split(/\r?\n/);

        let currentCountry = null;
        let currentCode = null;

        for (let i = 2; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const cols = parseCSVLine(line);
            if (!cols || cols.length < 3) continue;

            const api = cols[0].trim();
            const label = cols[1].trim();

            // Country header row (empty API)
            if (!api && label) {
                currentCountry = label;
                continue;
            }

            // Data row
            if (api.startsWith('INTL.47-33-') || api.startsWith('INTL.47-34-')) {
                const codeMatch = api.match(/INTL\.47-3[34]-([A-Z]+)-/);
                if (!codeMatch) continue;
                let code = codeMatch[1];

                // Map non-standard codes
                if (CODE_MAP.hasOwnProperty(code)) {
                    if (CODE_MAP[code] === null) {
                        if (code === 'WORL') {
                            // Store world data
                            const metricType = api.includes('47-33') ? 'pop' : 'gdp';
                            for (let j = 0; j < 44 && j + 2 < cols.length; j++) {
                                const v = parseVal(cols[j + 2]);
                                if (v !== null) worldData[metricType][1980 + j] = v;
                            }
                        }
                        continue;
                    }
                    code = CODE_MAP[code];
                }

                if (!allData[code]) allData[code] = { name: currentCountry || code, pop: {}, gdp: {} };
                const metricType = api.includes('47-33') ? 'pop' : 'gdp';

                for (let j = 0; j < 44 && j + 2 < cols.length; j++) {
                    const v = parseVal(cols[j + 2]);
                    if (v !== null) allData[code][metricType][1980 + j] = v;
                }
            }
        }
        renderMap();
        renderTimeline();
    }

    function parseVal(s) {
        if (!s) return null;
        s = s.trim().replace(/"/g, '');
        if (s === '--' || s === 'NA' || s === '' || s === '0') return null;
        const n = parseFloat(s);
        return isNaN(n) || n === 0 ? null : n;
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inQuotes) {
                if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
                else if (ch === '"') inQuotes = false;
                else current += ch;
            } else {
                if (ch === '"') inQuotes = true;
                else if (ch === ',') { result.push(current); current = ''; }
                else current += ch;
            }
        }
        result.push(current);
        return result;
    }

    function getMetricData(year) {
        const key = currentMetric === 'population' ? 'pop' : 'gdp';
        const codes = [], values = [], names = [];
        for (const [code, d] of Object.entries(allData)) {
            const v = d[key][year];
            if (v != null) {
                codes.push(code);
                values.push(v);
                names.push(d.name);
            }
        }
        return { codes, values, names };
    }

    function renderMap() {
        const { codes, values, names } = getMetricData(currentYear);
        const isPop = currentMetric === 'population';
        const unit = isPop ? 'MMBtu/person' : '1000 Btu/2015$ GDP PPP';
        const colorscale = isPop
            ? [[0, '#0c4a6e'], [0.2, '#0369a1'], [0.4, '#0ea5e9'], [0.6, '#fbbf24'], [0.8, '#f97316'], [1, '#dc2626']]
            : [[0, '#064e3b'], [0.2, '#059669'], [0.4, '#34d399'], [0.6, '#fbbf24'], [0.8, '#f97316'], [1, '#dc2626']];

        const hoverText = names.map((n, i) => `${n}<br>${values[i].toFixed(2)} ${unit}`);

        const data = [{
            type: 'choropleth',
            locationmode: 'ISO-3',
            locations: codes,
            z: values,
            text: hoverText,
            hoverinfo: 'text',
            colorscale: colorscale,
            reversescale: false,
            colorbar: {
                title: { text: unit, font: { color: '#94a3b8', size: 11 } },
                tickfont: { color: '#94a3b8' },
                bgcolor: 'rgba(0,0,0,0)',
                len: 0.6
            },
            marker: { line: { color: '#1e293b', width: 0.5 } }
        }];

        const layout = {
            geo: {
                showframe: false,
                showcoastlines: true,
                coastlinecolor: '#334155',
                showland: true,
                landcolor: '#1e293b',
                showocean: true,
                oceancolor: '#0f172a',
                showlakes: false,
                showcountries: true,
                countrycolor: '#334155',
                projection: { type: 'natural earth' },
                bgcolor: '#0f172a'
            },
            margin: { t: 0, b: 0, l: 0, r: 0 },
            paper_bgcolor: '#0f172a',
            plot_bgcolor: '#0f172a',
            height: 520
        };

        Plotly.react('map', data, layout, { responsive: true, displayModeBar: false });
        updateStats(codes, values, names);
    }

    function updateStats(codes, values, names) {
        const key = currentMetric === 'population' ? 'pop' : 'gdp';
        const unit = currentMetric === 'population' ? 'MMBtu/person' : '1000 Btu/$GDP';
        const wv = worldData[key][currentYear];
        document.getElementById('statWorld').textContent = wv ? wv.toFixed(2) : '--';
        document.getElementById('statWorldUnit').textContent = unit;

        if (values.length > 0) {
            const maxIdx = values.indexOf(Math.max(...values));
            const filtered = values.filter(v => v > 0);
            const minVal = Math.min(...filtered);
            const minIdx = values.indexOf(minVal);
            document.getElementById('statMax').textContent = values[maxIdx].toFixed(2);
            document.getElementById('statMaxCountry').textContent = names[maxIdx];
            document.getElementById('statMin').textContent = minVal.toFixed(2);
            document.getElementById('statMinCountry').textContent = names[minIdx];
            document.getElementById('statCount').textContent = values.length;
        }
    }

    function renderTimeline() {
        const key = currentMetric === 'population' ? 'pop' : 'gdp';
        const unit = currentMetric === 'population' ? 'MMBtu/person' : '1000 Btu/2015$ GDP PPP';
        const wVals = years.map(y => worldData[key][y] || null);

        // Pick a few notable countries for reference lines
        const highlights = [
            { code: 'USA', color: '#3b82f6' },
            { code: 'CHN', color: '#ef4444' },
            { code: 'IND', color: '#22c55e' },
            { code: 'DEU', color: '#a855f7' },
            { code: 'BRA', color: '#f59e0b' }
        ];

        const traces = [{
            x: years, y: wVals,
            name: 'World',
            line: { color: '#f8fafc', width: 3 },
            mode: 'lines'
        }];

        for (const h of highlights) {
            if (allData[h.code]) {
                traces.push({
                    x: years,
                    y: years.map(y => allData[h.code][key][y] || null),
                    name: allData[h.code].name,
                    line: { color: h.color, width: 1.5, dash: 'dot' },
                    mode: 'lines'
                });
            }
        }

        // Vertical line for current year
        const shapes = [{
            type: 'line', x0: currentYear, x1: currentYear, y0: 0, y1: 1,
            yref: 'paper', line: { color: '#3b82f6', width: 2, dash: 'dash' }
        }];

        const layout = {
            margin: { t: 20, b: 40, l: 60, r: 20 },
            paper_bgcolor: '#0f172a',
            plot_bgcolor: '#0f172a',
            xaxis: { color: '#64748b', gridcolor: '#1e293b', range: [1979, 2024] },
            yaxis: { color: '#64748b', gridcolor: '#1e293b', title: { text: unit, font: { size: 11, color: '#64748b' } } },
            legend: { font: { color: '#94a3b8', size: 11 }, bgcolor: 'rgba(0,0,0,0)', x: 0.01, y: 0.99 },
            shapes: shapes,
            height: 250
        };

        Plotly.react('timeline', traces, layout, { responsive: true, displayModeBar: false });
    }

    function setMetric(m) {
        currentMetric = m;
        document.getElementById('btn-pop').classList.toggle('active', m === 'population');
        document.getElementById('btn-gdp').classList.toggle('active', m === 'gdp');
        renderMap();
        renderTimeline();
    }

    function setYear(y) {
        currentYear = y;
        document.getElementById('yearSlider').value = y;
        document.getElementById('yearLabel').textContent = y;
        renderMap();
        renderTimeline();
    }

    function togglePlay() {
        playing = !playing;
        const btn = document.getElementById('playBtn');
        if (playing) {
            btn.textContent = '⏸ Pause';
            btn.classList.add('playing');
            if (currentYear >= 2023) setYear(1980);
            playTimer = setInterval(() => {
                if (currentYear >= 2023) { togglePlay(); return; }
                setYear(currentYear + 1);
            }, 400);
        } else {
            btn.textContent = '▶ Play';
            btn.classList.remove('playing');
            clearInterval(playTimer);
        }
    }

    loadData();
    </script>
</body>
</html>
