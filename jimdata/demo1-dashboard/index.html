<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Energy Intensity Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Global Energy Intensity Dashboard</h1>
        <p>EIA International Energy Data &mdash; 231 countries, 1980&ndash;2023</p>
    </header>
    <div class="controls">
        <div class="metric-toggle">
            <button id="btn-pop" class="active" onclick="setMetric('population')">Energy per Capita</button>
            <button id="btn-gdp" onclick="setMetric('gdp')">Energy per GDP</button>
        </div>
        <div class="slider-group">
            <label>Year</label>
            <input type="range" id="yearSlider" min="1980" max="2023" value="2023" oninput="setYear(+this.value)">
            <span class="year-display" id="yearLabel">2023</span>
        </div>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
    </div>
    <div class="stats-bar" id="statsBar">
        <div class="stat-card">
            <div class="label">World Average</div>
            <div class="value" id="statWorld">--</div>
            <div class="unit" id="statWorldUnit"></div>
        </div>
        <div class="stat-card">
            <div class="label">Highest</div>
            <div class="value" id="statMax">--</div>
            <div class="unit" id="statMaxCountry"></div>
        </div>
        <div class="stat-card">
            <div class="label">Lowest (with data)</div>
            <div class="value" id="statMin">--</div>
            <div class="unit" id="statMinCountry"></div>
        </div>
        <div class="stat-card">
            <div class="label">Countries with data</div>
            <div class="value" id="statCount">--</div>
            <div class="unit">&nbsp;</div>
        </div>
    </div>
    <div id="map"></div>
    <div class="bottom-section">
        <div id="timeline-container">
            <div id="timeline"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
